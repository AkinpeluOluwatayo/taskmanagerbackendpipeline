name: TaskMaster Pro CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # We use 'clean install' to ensure a fresh build and run all tests
        run: mvn -B clean install

      - name: Archive Build Artifacts
        # This saves your .jar file so you can download it from the GitHub UI
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: taskmaster-api-jar
          path: target/*.jar