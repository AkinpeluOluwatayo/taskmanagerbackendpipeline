version: '3.8'
services:
  # Your Java App
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - prometheus

  # The Data Collector
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # The Dashboard
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"